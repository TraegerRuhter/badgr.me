name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The Supabase values below are the *public* anon key + URL — safe in a
      # client bundle by design (RLS gates access, not key secrecy). Swap them
      # here if the Supabase project ever changes.
      - name: Build
        run: pnpm --filter @alarmed/web build
        env:
          CI: "true"
          VITE_SUPABASE_URL: https://bdunfycunehryhwbkbbk.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdW5meWN1bmVocnlod2JrYmJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NzA0OTYsImV4cCI6MjA5ODE0NjQ5Nn0.GxgmiHe6qZPyt28Sn_M-tnP99cO4xktR3NCo-Y_4b60

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
